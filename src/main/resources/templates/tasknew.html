<!DOCTYPE html>
<html lang="en"
	  xmlns:th="http://thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Epic Task</title>
</head>

<body>
	<h1>Epic Task</h1>
	<h2>New task</h2>

	<form action="/tasks" method="post" th:object="${task}">
		<label for="title">Title</label>
		<input type="text" name="title" id="title" th:field="*{title}">
		<span th:errors="*{title}"></span>

		<label for="description">Description</label>
		<textarea name="description" id="description" cols="30" rows="10" th:field="*{description}"></textarea>
		<span th:errors="*{description}"></span>

		<label for="points">Points</label>
		<input type="range" name="points" id="points" min="10" max="500" th:field="*{points}">
		<span th:errors="*{points}"></span>

		<a href="/tasks">Cancel</a>
		<button>Save</button>
	</form>

</body>

</html>
